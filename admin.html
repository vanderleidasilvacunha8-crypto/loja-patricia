<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Admin – Loja da Patrícia</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800;900&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff4e8d;--pink-light:#ff80b0;--pink-pale:#fff0f6;
  --teal:#00c9a7;--orange:#ff7849;--blue:#4e8bff;
  --bg:#fff8fc;--card:#fff;--text:#2d1a2e;--muted:#9b7fa0;
  --red:#ff4444;--green:#00c9a7;
  --radius:16px;--shadow:0 4px 24px rgba(255,78,141,.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Quicksand',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#ff4e8d,#ff80b0,#ffb347);}
.login-box{background:#fff;border-radius:24px;padding:32px 24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.login-logo{font-family:'Baloo 2',cursive;font-size:22px;font-weight:900;color:var(--pink);text-align:center;margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px;}
.login-box label{font-size:12px;font-weight:700;color:var(--muted);display:block;margin-bottom:6px;}
.login-box input{width:100%;border:2px solid #eee;border-radius:12px;padding:12px 16px;font-family:'Quicksand',sans-serif;font-size:15px;color:var(--text);outline:none;margin-bottom:16px;transition:border .18s;}
.login-box input:focus{border-color:var(--pink);}
.login-btn{width:100%;background:linear-gradient(90deg,#ff4e8d,#ff7849);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:800;font-family:'Baloo 2',cursive;cursor:pointer;}
.login-err{color:var(--red);font-size:13px;text-align:center;margin-top:10px;display:none;}

/* ADMIN */
#adminScreen{display:none;}
.admin-header{background:linear-gradient(90deg,#ff4e8d,#ff7849);padding:18px 16px;display:flex;align-items:center;justify-content:space-between;}
.admin-header h1{font-family:'Baloo 2',cursive;font-size:18px;font-weight:900;color:#fff;}
.logout-btn{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:10px;padding:7px 14px;font-size:12px;font-weight:700;font-family:'Quicksand',sans-serif;cursor:pointer;}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:2px solid #f5eef9;}
.tab{flex:1;padding:12px;text-align:center;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;}
.tab.active{color:var(--pink);border-bottom-color:var(--pink);}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:16px;}
.stat-card{background:#fff;border-radius:14px;padding:14px 10px;text-align:center;box-shadow:var(--shadow);}
.stat-num{font-family:'Baloo 2',cursive;font-size:24px;font-weight:900;color:var(--pink);}
.stat-label{font-size:11px;color:var(--muted);font-weight:700;}

/* BOTÃO ADICIONAR */
.add-area{padding:0 16px 16px;}
.add-btn-big{width:100%;background:linear-gradient(90deg,#00c9a7,#4e8bff);color:#fff;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:800;font-family:'Baloo 2',cursive;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}

/* FILTRO CATS */
.filter-cats{display:flex;gap:8px;padding:0 16px 14px;overflow-x:auto;scrollbar-width:none;}
.filter-cats::-webkit-scrollbar{display:none;}
.fcat{background:#fff;border:2px solid #eee;border-radius:10px;padding:6px 14px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .18s;flex-shrink:0;}
.fcat.active{border-color:var(--pink);background:var(--pink-pale);color:var(--pink);}

/* LISTA PRODUTOS */
.prod-list{padding:0 16px 100px;display:flex;flex-direction:column;gap:10px;}
.prod-item{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;display:flex;align-items:center;gap:12px;}
.prod-thumb{width:54px;height:54px;border-radius:12px;object-fit:cover;background:#f5eef9;display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;overflow:hidden;}
.prod-thumb img{width:100%;height:100%;object-fit:cover;border-radius:12px;}
.prod-info{flex:1;min-width:0;}
.prod-name{font-size:14px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prod-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.prod-price{font-family:'Baloo 2',cursive;font-size:15px;font-weight:900;color:var(--pink);}
.prod-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
.btn-edit{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;font-family:'Quicksand',sans-serif;cursor:pointer;}
.btn-del{background:#fff;color:var(--red);border:2px solid var(--red);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;font-family:'Quicksand',sans-serif;cursor:pointer;}
.prod-badge{display:inline-block;font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;margin-top:3px;}
.badge-oferta{background:#fff3e0;color:var(--orange);}
.badge-novo{background:#e0fff9;color:var(--teal);}
.empty-list{text-align:center;color:var(--muted);padding:40px 0;font-size:14px;}

/* CATEGORIAS TAB */
.cat-list{padding:16px;display:flex;flex-direction:column;gap:10px;}
.cat-item{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;}
.cat-item-left{display:flex;align-items:center;gap:12px;}
.cat-emoji-big{font-size:32px;}
.cat-item-name{font-size:15px;font-weight:800;}
.cat-item-count{font-size:12px;color:var(--muted);}
.cat-actions{display:flex;gap:8px;}
.btn-cat-edit{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;}
.btn-cat-del{background:#fff;color:var(--red);border:2px solid var(--red);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;}
.cat-fixed-tag{font-size:10px;background:#f0f0f0;color:#999;padding:2px 8px;border-radius:6px;font-weight:700;}

/* ── FOTO UPLOAD NOVO ── */
.foto-section-label{font-size:12px;font-weight:700;color:var(--muted);display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.foto-main-wrap{position:relative;border:2px dashed #f0c0d8;border-radius:14px;overflow:hidden;background:#fff5fa;aspect-ratio:4/3;cursor:pointer;transition:border .2s;}
.foto-main-wrap:hover{border-color:var(--pink);}
.foto-main-img{width:100%;height:100%;display:block;}
.foto-main-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:6px;font-size:13px;}
.foto-main-placeholder .ico{font-size:36px;}
.foto-main-placeholder span{font-weight:700;color:var(--pink);}

/* botões de ajuste sobre a imagem principal */
.fit-btns{position:absolute;top:8px;right:8px;display:flex;gap:4px;z-index:2;}
.fit-btn{background:rgba(45,26,46,.65);color:#fff;border:none;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;font-family:'Quicksand',sans-serif;cursor:pointer;transition:background .15s;}
.fit-btn.active{background:var(--pink);}

/* badge "ampliar" */
.zoom-hint{position:absolute;bottom:8px;right:8px;background:rgba(45,26,46,.6);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:8px;pointer-events:none;}

/* miniaturas */
.foto-thumbs{display:flex;gap:8px;margin-top:10px;align-items:center;}
.thumb-item{position:relative;width:58px;height:52px;border-radius:10px;overflow:hidden;border:2px solid #f0c0d8;flex-shrink:0;cursor:pointer;background:#fff5fa;}
.thumb-item.selected{border-color:var(--pink);}
.thumb-item img{width:100%;height:100%;object-fit:contain;display:block;}
.thumb-del{position:absolute;top:1px;right:1px;background:rgba(255,68,68,.85);color:#fff;border:none;border-radius:5px;width:16px;height:16px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;padding:0;}
.thumb-add{width:58px;height:52px;border-radius:10px;border:2px dashed #d0b0d8;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:10px;font-weight:700;gap:2px;transition:border .18s;background:#fff5fa;}
.thumb-add:hover{border-color:var(--pink);color:var(--pink);}
.thumb-add .plus{font-size:20px;line-height:1;}
.foto-count-note{font-size:10px;color:var(--muted);margin-top:5px;text-align:right;}

/* ── LIGHTBOX ── */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;}
#lightbox.open{display:flex;}
#lbImg{max-width:94vw;max-height:78vh;object-fit:contain;border-radius:10px;}
#lbClose{position:fixed;top:16px;right:16px;background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:501;}
#lbPrev,#lbNext{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:501;}
#lbPrev{left:10px;}
#lbNext{right:10px;}
#lbDots{display:flex;gap:8px;margin-top:16px;}
.lb-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.35);cursor:pointer;transition:background .2s;}
.lb-dot.active{background:#fff;}

/* MODAL FORM */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.form-modal{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:24px 20px 40px;max-height:92vh;overflow-y:auto;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:#eee;border-radius:4px;margin:0 auto 20px;}
.form-title{font-family:'Baloo 2',cursive;font-size:20px;font-weight:900;margin-bottom:18px;}

.form-group{margin-bottom:14px;}
.form-group label{font-size:12px;font-weight:700;color:var(--muted);display:block;margin-bottom:6px;}
.form-group input,.form-group select{width:100%;border:2px solid #eee;border-radius:12px;padding:11px 14px;font-family:'Quicksand',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border .18s;background:#fff;}
.form-group input:focus,.form-group select:focus{border-color:var(--pink);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.form-save-btn{width:100%;background:linear-gradient(90deg,#ff4e8d,#ff7849);color:#fff;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;font-family:'Baloo 2',cursive;cursor:pointer;margin-top:8px;}
.form-cancel-btn{width:100%;background:#fff;color:var(--muted);border:2px solid #eee;border-radius:14px;padding:13px;font-size:14px;font-weight:700;font-family:'Quicksand',sans-serif;cursor:pointer;margin-top:8px;}

/* CONFIRM DELETE */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.confirm-overlay.open{display:flex;}
.confirm-box{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:340px;text-align:center;}
.confirm-box h3{font-family:'Baloo 2',cursive;font-size:18px;font-weight:900;margin-bottom:8px;}
.confirm-box p{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5;}
.confirm-btns{display:flex;gap:10px;}
.btn-confirm-del{flex:1;background:var(--red);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:800;font-family:'Baloo 2',cursive;cursor:pointer;}
.btn-confirm-cancel{flex:1;background:#fff;color:var(--muted);border:2px solid #eee;border-radius:12px;padding:11px;font-size:14px;font-weight:700;font-family:'Quicksand',sans-serif;cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#2d1a2e;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;opacity:0;transition:all .3s;z-index:600;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🛍️ Loja da Patrícia</div>
    <div class="login-sub">Painel Administrativo</div>
    <label>Senha</label>
    <input type="password" id="senhaInput" placeholder="Digite a senha...">
    <button class="login-btn" onclick="login()">Entrar</button>
    <div class="login-err" id="loginErr">❌ Senha incorreta!</div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen">
  <div class="admin-header">
    <h1>⚙️ Painel Admin</h1>
    <button class="logout-btn" onclick="logout()">Sair</button>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-prod" onclick="switchTab('prod')">🛍️ Produtos</div>
    <div class="tab" id="tab-cats" onclick="switchTab('cats')">📂 Categorias</div>
  </div>

  <div id="tabProd">
    <div class="stats" id="statsArea"></div>
    <div class="add-area">
      <button class="add-btn-big" onclick="openForm()">➕ Adicionar Novo Produto</button>
    </div>
    <div class="filter-cats" id="filterCats"></div>
    <div class="prod-list" id="prodList"></div>
  </div>

  <div id="tabCats" style="display:none;">
    <div style="padding:16px;">
      <button class="add-btn-big" onclick="openCatForm()">➕ Nova Categoria</button>
    </div>
    <div class="cat-list" id="catList"></div>
  </div>
</div>

<!-- ── LIGHTBOX ── -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lbClose" onclick="closeLightbox()">✕</button>
  <button id="lbPrev" onclick="lbNav(-1);event.stopPropagation()">‹</button>
  <img id="lbImg" src="" alt="Foto ampliada" onclick="event.stopPropagation()">
  <div id="lbDots" onclick="event.stopPropagation()"></div>
  <button id="lbNext" onclick="lbNav(1);event.stopPropagation()">›</button>
</div>

<!-- FORM PRODUTO -->
<div class="modal-overlay" id="formModal">
  <div class="form-modal">
    <div class="modal-handle"></div>
    <div class="form-title" id="formTitle">➕ Novo Produto</div>

    <!-- FOTOS (nova seção multi-imagem) -->
    <div class="form-group">
      <div class="foto-section-label">📸 Fotos do Produto <small style="color:#ccc;font-weight:500">(até 4 fotos)</small></div>

      <!-- imagem principal grande -->
      <div class="foto-main-wrap" id="fotoMainWrap" onclick="openLightboxForm()">
        <img id="fotoMainImg" class="foto-main-img" src="" alt="" style="display:none;object-fit:contain;">
        <div class="foto-main-placeholder" id="fotoMainPlaceholder">
          <span class="ico">📷</span>
          <div>Toque para <span>escolher fotos</span></div>
          <small style="color:#ccc;font-size:11px">JPG, PNG ou WEBP</small>
        </div>
        <!-- botões fit -->
        <div class="fit-btns" id="fitBtns" style="display:none" onclick="event.stopPropagation()">
          <button class="fit-btn active" id="btnContain" onclick="setFit('contain')">Mostrar tudo</button>
          <button class="fit-btn" id="btnCover" onclick="setFit('cover')">Preencher</button>
        </div>
        <div class="zoom-hint" id="zoomHint" style="display:none">🔍 Toque p/ ampliar</div>
      </div>

      <!-- miniaturas + botão adicionar -->
      <div class="foto-thumbs" id="fotoThumbs"></div>
      <div class="foto-count-note" id="fotoCountNote"></div>

      <!-- input file oculto (aceita múltiplos) -->
      <input type="file" id="fotoInput" accept="image/*" multiple style="display:none" onchange="handleFotos(event)">
    </div>

    <div class="form-group">
      <label>Nome do Produto</label>
      <input type="text" id="fName" placeholder="Ex: Cabo USB-C">
    </div>
    <div class="form-group">
      <label>Descrição</label>
      <input type="text" id="fDesc" placeholder="Ex: Alta velocidade, 1 metro">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Preço (R$)</label>
        <input type="number" id="fPrice" placeholder="0,00" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label>Preço antigo (R$)</label>
        <input type="number" id="fOldPrice" placeholder="Opcional" step="0.01" min="0">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Unidade</label>
        <select id="fUnit">
          <option value="un">un (unidade)</option>
          <option value="kg">kg</option>
          <option value="par">par</option>
          <option value="kit">kit</option>
          <option value="fl">fl (folha)</option>
          <option value="pág">pág</option>
          <option value="mç">mç (maço)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Categoria</label>
        <select id="fCat"></select>
      </div>
    </div>
    <div class="form-group">
      <label>Destaque</label>
      <select id="fBadge">
        <option value="">Nenhum</option>
        <option value="novo">🆕 NOVO</option>
        <option value="oferta">🔥 OFERTA</option>
      </select>
    </div>
    <button class="form-save-btn" onclick="saveProduct()">💾 Salvar Produto</button>
    <button class="form-cancel-btn" onclick="closeForm()">Cancelar</button>
  </div>
</div>

<!-- FORM CATEGORIA -->
<div class="modal-overlay" id="catModal">
  <div class="form-modal">
    <div class="modal-handle"></div>
    <div class="form-title" id="catFormTitle">📂 Nova Categoria</div>
    <div class="form-group">
      <label>Emoji da Categoria</label>
      <input type="text" id="cEmoji" placeholder="Ex: 🎮" maxlength="2" style="font-size:24px;text-align:center;">
    </div>
    <div class="form-group">
      <label>Nome da Categoria</label>
      <input type="text" id="cName" placeholder="Ex: Games, Bebidas, Brinquedos...">
    </div>
    <button class="form-save-btn" onclick="saveCat()">💾 Salvar Categoria</button>
    <button class="form-cancel-btn" onclick="closeCatForm()">Cancelar</button>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3 id="confirmTitle">🗑️ Excluir?</h3>
    <p id="confirmText"></p>
    <div class="confirm-btns">
      <button class="btn-confirm-cancel" onclick="closeConfirm()">Cancelar</button>
      <button class="btn-confirm-del" onclick="confirmDelete()">Excluir</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SENHA = 'Casa2018@';

const DEFAULT_CATS = [
  {id:'info',    emoji:'💻', name:'Informática', fixed:true},
  {id:'papelaria',emoji:'📚',name:'Papelaria',   fixed:true},
  {id:'roupas',  emoji:'👕', name:'Roupas',      fixed:true},
  {id:'servicos',emoji:'🖨️', name:'Serviços',    fixed:true},
  {id:'utilidades',emoji:'🏠',name:'Utilidades', fixed:true},
  {id:'moda',    emoji:'👗', name:'Moda',        fixed:true},
];

const DEFAULT_PRODUCTS = [
  {id:1,name:'Cabo USB-C 1m',imgs:[],emoji:'🔌',price:19.90,oldPrice:29.90,unit:'un',cat:'info',desc:'Compatível com celular, tablet e notebook.',badge:'oferta'},
  {id:2,name:'Mouse Sem Fio',imgs:[],emoji:'🖱️',price:49.90,oldPrice:null,unit:'un',cat:'info',desc:'Conexão USB, pilha inclusa, 1200 DPI.',badge:'novo'},
  {id:3,name:'Pendrive 32GB',imgs:[],emoji:'💾',price:29.90,oldPrice:39.90,unit:'un',cat:'info',desc:'Armazenamento rápido e durável.',badge:'oferta'},
  {id:4,name:'Fone de Ouvido',imgs:[],emoji:'🎧',price:39.90,oldPrice:null,unit:'un',cat:'info',desc:'Com microfone, cabo 1,2m.'},
  {id:5,name:'Carregador 20W',imgs:[],emoji:'⚡',price:34.90,oldPrice:null,unit:'un',cat:'info',desc:'Carregamento rápido.',badge:'novo'},
  {id:6,name:'Película de Celular',imgs:[],emoji:'📱',price:15.00,oldPrice:null,unit:'un',cat:'info',desc:'Vidro temperado 9H.'},
  {id:7,name:'Caderno Espiral 200f',imgs:[],emoji:'📓',price:22.90,oldPrice:29.90,unit:'un',cat:'papelaria',desc:'200 folhas pautadas.',badge:'oferta'},

let products=[], categories=[], filterCat='todos', editingId=null, deletingId=null, deletingType='prod', editingCatId=null, currentTab='prod';

// Estado das fotos no formulário
let formImgs = [];      // array de base64 strings
let formImgFit = 'contain';  // 'contain' ou 'cover'
let formMainIdx = 0;    // qual foto está sendo exibida como principal

// Estado do lightbox
let lbImgs = [];
let lbIdx = 0;
let lbSource = 'form'; // 'form' ou 'prod' (aberto de onde)

function saveStorage(){
  localStorage.setItem('loja_patricia_products', JSON.stringify(products));
  localStorage.setItem('loja_patricia_cats', JSON.stringify(categories));
}
function loadStorage(){
  const p=localStorage.getItem('loja_patricia_products');
  const c=localStorage.getItem('loja_patricia_cats');
  products = p ? JSON.parse(p) : JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
  categories = c ? JSON.parse(c) : JSON.parse(JSON.stringify(DEFAULT_CATS));
}

function login(){
  if(document.getElementById('senhaInput').value===SENHA){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminScreen').style.display='block';
    loadStorage(); renderAll();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('senhaInput').value='';
  }
}
function logout(){
  document.getElementById('adminScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('senhaInput').value='';
}

function switchTab(t){
  currentTab=t;
  document.getElementById('tabProd').style.display = t==='prod'?'block':'none';
  document.getElementById('tabCats').style.display = t==='cats'?'block':'none';
  document.getElementById('tab-prod').classList.toggle('active', t==='prod');
  document.getElementById('tab-cats').classList.toggle('active', t==='cats');
  if(t==='cats') renderCatList();
}

function renderAll(){ renderStats(); renderFilterCats(); renderList(); }

function renderStats(){
  document.getElementById('statsArea').innerHTML=`
    <div class="stat-card"><div class="stat-num">${products.length}</div><div class="stat-label">Produtos</div></div>
    <div class="stat-card"><div class="stat-num">${categories.length}</div><div class="stat-label">Categorias</div></div>
    <div class="stat-card"><div class="stat-num">${products.filter(p=>p.badge).length}</div><div class="stat-label">Em Destaque</div></div>
  `;
}

function getCatName(id){
  const c=categories.find(x=>x.id===id);
  return c ? c.emoji+' '+c.name : id;
}

function renderFilterCats(){
  const fc=document.getElementById('filterCats');
  fc.innerHTML=`<div class="fcat ${filterCat==='todos'?'active':''}" onclick="setFilter('todos')">🛒 Todos</div>`
    + categories.map(c=>`<div class="fcat ${filterCat===c.id?'active':''}" onclick="setFilter('${c.id}')">${c.emoji} ${c.name}</div>`).join('');
}

function renderList(){
  let list = filterCat==='todos' ? products : products.filter(p=>p.cat===filterCat);
  if(!list.length){ document.getElementById('prodList').innerHTML='<div class="empty-list">Nenhum produto aqui 😕</div>'; return; }
  document.getElementById('prodList').innerHTML = list.map(p=>{
    const imgs = p.imgs && p.imgs.length ? p.imgs : [];
    const thumbSrc = imgs[0] || null;
    return `
    <div class="prod-item">
      <div class="prod-thumb" ${imgs.length?`onclick="openLightboxProd(${p.id})" style="cursor:pointer"`:''}">
        ${thumbSrc ? `<img src="${thumbSrc}" alt="${p.name}" style="object-fit:${p.imgFit||'contain'}">` : (p.emoji||'🛍️')}
      </div>
      <div class="prod-info">
        <div class="prod-name">${p.name}</div>
        <div class="prod-meta">${getCatName(p.cat)} · por ${p.unit}${imgs.length>1?' · '+imgs.length+' fotos':''}</div>
        <div class="prod-price">R$ ${p.price.toFixed(2).replace('.',',')}${p.oldPrice?` <small style="text-decoration:line-through;color:#ccc;font-size:11px">R$ ${p.oldPrice.toFixed(2).replace('.',',')}</small>`:''}</div>
        ${p.badge?`<span class="prod-badge badge-${p.badge}">${p.badge==='novo'?'🆕 NOVO':'🔥 OFERTA'}</span>`:''}
      </div>
      <div class="prod-actions">
        <button class="btn-edit" onclick="openEdit(${p.id})">✏️ Editar</button>
        <button class="btn-del" onclick="openConfirmDelete(${p.id},'prod')">🗑️ Excluir</button>
      </div>
    </div>`;
  }).join('');
}

function renderCatList(){
  document.getElementById('catList').innerHTML = categories.map(c=>`
    <div class="cat-item">
      <div class="cat-item-left">
        <div class="cat-emoji-big">${c.emoji}</div>
        <div>
          <div class="cat-item-name">${c.name}</div>
          <div class="cat-item-count">${products.filter(p=>p.cat===c.id).length} produtos</div>
        </div>
      </div>
      <div class="cat-actions">
        ${c.fixed?'<span class="cat-fixed-tag">padrão</span>':''}
        <button class="btn-cat-edit" onclick="openEditCat('${c.id}')">✏️</button>
        ${!c.fixed?`<button class="btn-cat-del" onclick="openConfirmDelete('${c.id}','cat')">🗑️</button>`:''}
      </div>
    </div>
  `).join('');
}

function setFilter(cat){ filterCat=cat; renderFilterCats(); renderList(); }

// ── GESTÃO DE FOTOS NO FORM ──────────────────────────────────────

function handleFotos(e){
  const files = Array.from(e.target.files);
  const slots = 4 - formImgs.length;
  const toLoad = files.slice(0, slots);
  if(!toLoad.length){ showToast('⚠️ Máximo de 4 fotos!'); return; }

  let loaded = 0;
  toLoad.forEach(file=>{
    const reader = new FileReader();
    reader.onload = ev => {
      formImgs.push(ev.target.result);
      loaded++;
      if(loaded === toLoad.length){
        formMainIdx = 0;
        renderFotoSection();
      }
    };
    reader.readAsDataURL(file);
  });
  e.target.value = ''; // reset para poder selecionar a mesma imagem novamente
}

function triggerFotoInput(){
  document.getElementById('fotoInput').click();
}

function setMainThumb(idx){
  formMainIdx = idx;
  renderFotoSection();
}

function removeFormImg(idx, e){
  e.stopPropagation();
  formImgs.splice(idx, 1);
  if(formMainIdx >= formImgs.length) formMainIdx = Math.max(0, formImgs.length-1);
  renderFotoSection();
}

function setFit(mode){
  formImgFit = mode;
  const img = document.getElementById('fotoMainImg');
  img.style.objectFit = mode;
  document.getElementById('btnContain').classList.toggle('active', mode==='contain');
  document.getElementById('btnCover').classList.toggle('active', mode==='cover');
}

function renderFotoSection(){
  const mainImg  = document.getElementById('fotoMainImg');
  const placeholder = document.getElementById('fotoMainPlaceholder');
  const fitBtns  = document.getElementById('fitBtns');
  const zoomHint = document.getElementById('zoomHint');
  const thumbRow = document.getElementById('fotoThumbs');
  const countNote= document.getElementById('fotoCountNote');

  if(formImgs.length === 0){
    mainImg.style.display='none';
    mainImg.src='';
    placeholder.style.display='flex';
    fitBtns.style.display='none';
    zoomHint.style.display='none';
    // principal wrap vira botão de adicionar
    document.getElementById('fotoMainWrap').onclick = triggerFotoInput;
  } else {
    mainImg.src = formImgs[formMainIdx];
    mainImg.style.display='block';
    mainImg.style.objectFit = formImgFit;
    placeholder.style.display='none';
    fitBtns.style.display='flex';
    zoomHint.style.display='block';
    document.getElementById('fotoMainWrap').onclick = openLightboxForm;
    // sincroniza botões fit
    document.getElementById('btnContain').classList.toggle('active', formImgFit==='contain');
    document.getElementById('btnCover').classList.toggle('active', formImgFit==='cover');
  }

  // miniaturas
  thumbRow.innerHTML = '';
  formImgs.forEach((src, i)=>{
    const wrap = document.createElement('div');
    wrap.className = 'thumb-item' + (i===formMainIdx?' selected':'');
    wrap.onclick = () => setMainThumb(i);
    const img = document.createElement('img');
    img.src = src;
    img.alt = 'Foto '+(i+1);
    const del = document.createElement('button');
    del.className = 'thumb-del';
    del.textContent = '✕';
    del.title = 'Remover foto';
    del.onclick = (ev) => removeFormImg(i, ev);
    wrap.appendChild(img);
    wrap.appendChild(del);
    thumbRow.appendChild(wrap);
  });

  // botão adicionar (se tiver espaço)
  if(formImgs.length < 4){
    const add = document.createElement('div');
    add.className = 'thumb-add';
    add.title = 'Adicionar foto';
    add.onclick = triggerFotoInput;
    add.innerHTML = '<span class="plus">+</span><span>Foto</span>';
    thumbRow.appendChild(add);
  }

  countNote.textContent = formImgs.length > 0 ? formImgs.length+'/4 fotos adicionadas' : '';
}

// ── LIGHTBOX ──────────────────────────────────────────────────────

function openLightboxForm(){
  if(formImgs.length===0) return;
  lbImgs = formImgs;
  lbIdx = formMainIdx;
  lbSource = 'form';
  showLightbox();
}

function openLightboxProd(prodId){
  const p = products.find(x=>x.id===prodId);
  if(!p || !p.imgs || !p.imgs.length) return;
  lbImgs = p.imgs;
  lbIdx = 0;
  lbSource = 'prod';
  showLightbox();
}

function showLightbox(){
  document.getElementById('lbImg').src = lbImgs[lbIdx];
  renderLbDots();
  document.getElementById('lbPrev').style.display = lbImgs.length>1?'flex':'none';
  document.getElementById('lbNext').style.display = lbImgs.length>1?'flex':'none';
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
}

function lbNav(dir){
  lbIdx = (lbIdx + dir + lbImgs.length) % lbImgs.length;
  document.getElementById('lbImg').src = lbImgs[lbIdx];
  // se lightbox aberto do form, sincroniza miniatura selecionada
  if(lbSource==='form'){
    formMainIdx = lbIdx;
    renderFotoSection();
  }
  renderLbDots();
}

function renderLbDots(){
  const el = document.getElementById('lbDots');
  el.innerHTML = '';
  lbImgs.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className = 'lb-dot' + (i===lbIdx?' active':'');
    d.onclick = () => { lbIdx=i; document.getElementById('lbImg').src=lbImgs[i]; if(lbSource==='form'){formMainIdx=i;renderFotoSection();} renderLbDots(); };
    el.appendChild(d);
  });
}

// ── FORM PRODUTO ──────────────────────────────────────────────────

function populateCatSelect(){
  const sel=document.getElementById('fCat');
  sel.innerHTML=categories.map(c=>`<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('');
}

function resetFormFotos(){
  formImgs=[];
  formMainIdx=0;
  formImgFit='contain';
  document.getElementById('fotoInput').value='';
  renderFotoSection();
}

function openForm(){
  editingId=null;
  document.getElementById('formTitle').textContent='➕ Novo Produto';
  document.getElementById('fName').value='';
  document.getElementById('fDesc').value='';
  document.getElementById('fPrice').value='';
  document.getElementById('fOldPrice').value='';
  document.getElementById('fUnit').value='un';
  document.getElementById('fBadge').value='';
  resetFormFotos();
  populateCatSelect();
  document.getElementById('formModal').classList.add('open');
}

function openEdit(id){
  const p=products.find(x=>x.id===id);
  editingId=id;
  document.getElementById('formTitle').textContent='✏️ Editar Produto';
  document.getElementById('fName').value=p.name;
  document.getElementById('fDesc').value=p.desc||'';
  document.getElementById('fPrice').value=p.price;
  document.getElementById('fOldPrice').value=p.oldPrice||'';
  document.getElementById('fUnit').value=p.unit;
  document.getElementById('fBadge').value=p.badge||'';
  // carregar fotos existentes
  formImgs = p.imgs ? [...p.imgs] : (p.img ? [p.img] : []);
  formMainIdx = 0;
  formImgFit = p.imgFit || 'contain';
  document.getElementById('fotoInput').value='';
  renderFotoSection();
  populateCatSelect();
  document.getElementById('fCat').value=p.cat;
  document.getElementById('formModal').classList.add('open');
}

function closeForm(){ document.getElementById('formModal').classList.remove('open'); }

function saveProduct(){
  const name=document.getElementById('fName').value.trim();
  const price=parseFloat(document.getElementById('fPrice').value);
  if(!name){ showToast('⚠️ Digite o nome!'); return; }
  if(isNaN(price)||price<0){ showToast('⚠️ Preço inválido!'); return; }

  const prod={
    id: editingId||Date.now(),
    name,
    imgs: [...formImgs],
    imgFit: formImgFit,
    emoji: formImgs.length ? null : (editingId ? products.find(x=>x.id===editingId)?.emoji||'🛍️' : '🛍️'),
    price,
    oldPrice: parseFloat(document.getElementById('fOldPrice').value)||null,
    unit: document.getElementById('fUnit').value,
    cat: document.getElementById('fCat').value,
    desc: document.getElementById('fDesc').value.trim(),
    badge: document.getElementById('fBadge').value||null,
  };

  if(editingId){ const i=products.findIndex(x=>x.id===editingId); products[i]=prod; showToast('✅ Produto atualizado!'); }
  else { products.push(prod); showToast('✅ Produto adicionado!'); }
  saveStorage(); closeForm(); renderAll();
}

// ── FORM CATEGORIA ────────────────────────────────────────────────

function openCatForm(){
  editingCatId=null;
  document.getElementById('catFormTitle').textContent='📂 Nova Categoria';
  document.getElementById('cEmoji').value='';
  document.getElementById('cName').value='';
  document.getElementById('catModal').classList.add('open');
}
function openEditCat(id){
  const c=categories.find(x=>x.id===id);
  editingCatId=id;
  document.getElementById('catFormTitle').textContent='✏️ Editar Categoria';
  document.getElementById('cEmoji').value=c.emoji;
  document.getElementById('cName').value=c.name;
  document.getElementById('catModal').classList.add('open');
}
function closeCatForm(){ document.getElementById('catModal').classList.remove('open'); }
function saveCat(){
  const emoji=document.getElementById('cEmoji').value.trim()||'📦';
  const name=document.getElementById('cName').value.trim();
  if(!name){ showToast('⚠️ Digite o nome da categoria!'); return; }
  if(editingCatId){
    const i=categories.findIndex(x=>x.id===editingCatId);
    categories[i]={...categories[i], emoji, name};
    showToast('✅ Categoria atualizada!');
  } else {
    const id='cat_'+Date.now();
    categories.push({id, emoji, name, fixed:false});
    showToast('✅ Categoria criada!');
  }
  saveStorage(); closeCatForm(); renderAll(); renderCatList();
}

// ── DELETE ────────────────────────────────────────────────────────

function openConfirmDelete(id,type){
  deletingId=id; deletingType=type;
  if(type==='prod'){
    const p=products.find(x=>x.id===id);
    document.getElementById('confirmTitle').textContent='🗑️ Excluir Produto?';
    document.getElementById('confirmText').textContent=`Tem certeza que quer excluir "${p.name}"?`;
  } else {
    const c=categories.find(x=>x.id===id);
    const count=products.filter(p=>p.cat===id).length;
    document.getElementById('confirmTitle').textContent='🗑️ Excluir Categoria?';
    document.getElementById('confirmText').textContent=`Excluir "${c.name}"? Os ${count} produtos desta categoria ficarão sem categoria.`;
  }
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm(){ document.getElementById('confirmOverlay').classList.remove('open'); }
function confirmDelete(){
  if(deletingType==='prod'){ products=products.filter(x=>x.id!==deletingId); showToast('🗑️ Produto excluído!'); }
  else { categories=categories.filter(x=>x.id!==deletingId); showToast('🗑️ Categoria excluída!'); renderCatList(); }
  saveStorage(); closeConfirm(); renderAll();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// swipe no lightbox (mobile)
(function(){
  let sx=0;
  const lb = document.getElementById('lightbox');
  lb.addEventListener('touchstart',e=>{ sx=e.touches[0].clientX; },{passive:true});
  lb.addEventListener('touchend',e=>{
    const dx = e.changedTouches[0].clientX - sx;
    if(Math.abs(dx)>50){ lbNav(dx<0?1:-1); }
  },{passive:true});
})();

document.getElementById('senhaInput').addEventListener('keydown',e=>{ if(e.key==='Enter') login(); });
