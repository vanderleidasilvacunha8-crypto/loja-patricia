<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Admin – Loja da Patrícia</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800;900&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff4e8d;--pink-light:#ff80b0;--pink-pale:#fff0f6;
  --teal:#00c9a7;--orange:#ff7849;--blue:#4e8bff;
  --bg:#fff8fc;--card:#fff;--text:#2d1a2e;--muted:#9b7fa0;
  --red:#ff4444;--green:#00c9a7;
  --radius:16px;--shadow:0 4px 24px rgba(255,78,141,.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Quicksand',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;}

/* LOGIN */
#loginScreen{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;
  background:linear-gradient(135deg,#ff4e8d,#ff80b0,#ffb347);
}
.login-box{background:#fff;border-radius:24px;padding:32px 24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.login-logo{font-family:'Baloo 2',cursive;font-size:22px;font-weight:900;color:var(--pink);text-align:center;margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px;}
.login-box label{font-size:12px;font-weight:700;color:var(--muted);display:block;margin-bottom:6px;}
.login-box input{width:100%;border:2px solid #eee;border-radius:12px;padding:12px 16px;font-family:'Quicksand',sans-serif;font-size:15px;color:var(--text);outline:none;margin-bottom:16px;transition:border .18s;}
.login-box input:focus{border-color:var(--pink);}
.login-btn{width:100%;background:linear-gradient(90deg,#ff4e8d,#ff7849);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:800;font-family:'Baloo 2',cursive;cursor:pointer;}
.login-err{color:var(--red);font-size:13px;text-align:center;margin-top:10px;display:none;}

/* ADMIN */
#adminScreen{display:none;}
.admin-header{background:linear-gradient(90deg,#ff4e8d,#ff7849);padding:18px 16px;display:flex;align-items:center;justify-content:space-between;}
.admin-header h1{font-family:'Baloo 2',cursive;font-size:18px;font-weight:900;color:#fff;}
.logout-btn{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:10px;padding:7px 14px;font-size:12px;font-weight:700;font-family:'Quicksand',sans-serif;cursor:pointer;}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:16px;}
.stat-card{background:#fff;border-radius:14px;padding:14px 10px;text-align:center;box-shadow:var(--shadow);}
.stat-num{font-family:'Baloo 2',cursive;font-size:24px;font-weight:900;color:var(--pink);}
.stat-label{font-size:11px;color:var(--muted);font-weight:700;}

/* BOTÃO ADICIONAR */
.add-area{padding:0 16px 16px;}
.add-btn-big{width:100%;background:linear-gradient(90deg,#00c9a7,#4e8bff);color:#fff;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:800;font-family:'Baloo 2',cursive;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}

/* FILTRO CATS */
.filter-cats{display:flex;gap:8px;padding:0 16px 14px;overflow-x:auto;scrollbar-width:none;}
.filter-cats::-webkit-scrollbar{display:none;}
.fcat{background:#fff;border:2px solid #eee;border-radius:10px;padding:6px 14px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .18s;}
.fcat.active{border-color:var(--pink);background:var(--pink-pale);color:var(--pink);}

/* LISTA PRODUTOS */
.prod-list{padding:0 16px 100px;display:flex;flex-direction:column;gap:10px;}
.prod-item{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;display:flex;align-items:center;gap:12px;}
.prod-emoji{font-size:38px;min-width:48px;text-align:center;}
.prod-info{flex:1;}
.prod-name{font-size:14px;font-weight:800;color:var(--text);}
.prod-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.prod-price{font-family:'Baloo 2',cursive;font-size:15px;font-weight:900;color:var(--pink);}
.prod-actions{display:flex;flex-direction:column;gap:6px;}
.btn-edit{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;font-family:'Quicksand',sans-serif;cursor:pointer;}
.btn-del{background:#fff;color:var(--red);border:2px solid var(--red);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;font-family:'Quicksand',sans-serif;cursor:pointer;}
.prod-badge{display:inline-block;font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;margin-top:3px;}
.badge-oferta{background:#fff3e0;color:var(--orange);}
.badge-novo{background:#e0fff9;color:var(--teal);}
.empty-list{text-align:center;color:var(--muted);padding:40px 0;font-size:14px;}

/* MODAL FORM */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.form-modal{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:24px 20px 40px;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:#eee;border-radius:4px;margin:0 auto 20px;}
.form-title{font-family:'Baloo 2',cursive;font-size:20px;font-weight:900;margin-bottom:18px;}

.form-group{margin-bottom:14px;}
.form-group label{font-size:12px;font-weight:700;color:var(--muted);display:block;margin-bottom:6px;}
.form-group input, .form-group select{
  width:100%;border:2px solid #eee;border-radius:12px;padding:11px 14px;
  font-family:'Quicksand',sans-serif;font-size:14px;color:var(--text);outline:none;
  transition:border .18s;background:#fff;
}
.form-group input:focus, .form-group select:focus{border-color:var(--pink);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* EMOJI PICKER */
.emoji-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.emoji-opt{width:44px;height:44px;border-radius:10px;border:2px solid #eee;background:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border .15s;}
.emoji-opt.selected{border-color:var(--pink);background:var(--pink-pale);}

.form-save-btn{width:100%;background:linear-gradient(90deg,#ff4e8d,#ff7849);color:#fff;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;font-family:'Baloo 2',cursive;cursor:pointer;margin-top:8px;}
.form-cancel-btn{width:100%;background:#fff;color:var(--muted);border:2px solid #eee;border-radius:14px;padding:13px;font-size:14px;font-weight:700;font-family:'Quicksand',sans-serif;cursor:pointer;margin-top:8px;}

/* CONFIRM DELETE */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.confirm-overlay.open{display:flex;}
.confirm-box{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:340px;text-align:center;}
.confirm-box h3{font-family:'Baloo 2',cursive;font-size:18px;font-weight:900;margin-bottom:8px;}
.confirm-box p{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5;}
.confirm-btns{display:flex;gap:10px;}
.btn-confirm-del{flex:1;background:var(--red);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:800;font-family:'Baloo 2',cursive;cursor:pointer;}
.btn-confirm-cancel{flex:1;background:#fff;color:var(--muted);border:2px solid #eee;border-radius:12px;padding:11px;font-size:14px;font-weight:700;font-family:'Quicksand',sans-serif;cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#2d1a2e;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;opacity:0;transition:all .3s;z-index:300;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🛍️ Loja da Patrícia</div>
    <div class="login-sub">Painel Administrativo</div>
    <label>Senha</label>
    <input type="password" id="senhaInput" placeholder="Digite a senha..." onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Entrar</button>
    <div class="login-err" id="loginErr">❌ Senha incorreta!</div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen">
  <div class="admin-header">
    <h1>⚙️ Painel Admin</h1>
    <button class="logout-btn" onclick="logout()">Sair</button>
  </div>

  <div class="stats" id="statsArea"></div>

  <div class="add-area">
    <button class="add-btn-big" onclick="openForm()">➕ Adicionar Novo Produto</button>
  </div>

  <div class="filter-cats" id="filterCats"></div>

  <div class="prod-list" id="prodList"></div>
</div>

<!-- FORM MODAL -->
<div class="modal-overlay" id="formModal">
  <div class="form-modal">
    <div class="modal-handle"></div>
    <div class="form-title" id="formTitle">➕ Novo Produto</div>

    <div class="form-group">
      <label>Emoji do Produto</label>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>

    <div class="form-group">
      <label>Nome do Produto</label>
      <input type="text" id="fName" placeholder="Ex: Cabo USB-C">
    </div>

    <div class="form-group">
      <label>Descrição</label>
      <input type="text" id="fDesc" placeholder="Ex: Alta velocidade, 1 metro">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Preço (R$)</label>
        <input type="number" id="fPrice" placeholder="0,00" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label>Preço antigo (R$)</label>
        <input type="number" id="fOldPrice" placeholder="Opcional" step="0.01" min="0">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Unidade</label>
        <select id="fUnit">
          <option value="un">un (unidade)</option>
          <option value="kg">kg</option>
          <option value="par">par</option>
          <option value="kit">kit</option>
          <option value="fl">fl (folha)</option>
          <option value="pág">pág</option>
          <option value="mç">mç (maço)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Categoria</label>
        <select id="fCat">
          <option value="info">💻 Informática</option>
          <option value="papelaria">📚 Papelaria</option>
          <option value="roupas">👕 Roupas</option>
          <option value="servicos">🖨️ Serviços</option>
          <option value="utilidades">🏠 Utilidades</option>
          <option value="moda">👗 Moda</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Destaque</label>
      <select id="fBadge">
        <option value="">Nenhum</option>
        <option value="novo">🆕 NOVO</option>
        <option value="oferta">🔥 OFERTA</option>
      </select>
    </div>

    <button class="form-save-btn" onclick="saveProduct()">💾 Salvar Produto</button>
    <button class="form-cancel-btn" onclick="closeForm()">Cancelar</button>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>🗑️ Excluir Produto?</h3>
    <p id="confirmText">Tem certeza que quer excluir este produto? Essa ação não pode ser desfeita.</p>
    <div class="confirm-btns">
      <button class="btn-confirm-cancel" onclick="closeConfirm()">Cancelar</button>
      <button class="btn-confirm-del" onclick="confirmDelete()">Excluir</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════
// SENHA
// ══════════════════════════════════
const SENHA = 'Casa2018@';

// ══════════════════════════════════
// EMOJIS DISPONÍVEIS
// ══════════════════════════════════
const emojis = ['💻','🖱️','⌨️','🖨️','📱','🔌','💾','🎧','⚡','📡',
  '📚','📓','✏️','📐','📏','🎒','📂','🖊️','📌','📎',
  '👕','👖','👗','👚','👜','🧦','👟','🕶️','👒','💍',
  '🏠','🔋','📦','🛍️','🧹','🪣','🔧','💡','🪴','🧺',
  '🌈','🎁','⭐','🔥','💎','🎨','🎯','🏷️','🛒','💰'];

// ══════════════════════════════════
// PRODUTOS PADRÃO (mesmo da loja)
// ══════════════════════════════════
const defaultProducts = [
  {id:1,name:'Cabo USB-C 1m',emoji:'🔌',price:19.90,oldPrice:29.90,unit:'un',cat:'info',desc:'Compatível com celular, tablet e notebook.',badge:'oferta'},
  {id:2,name:'Mouse Sem Fio',emoji:'🖱️',price:49.90,oldPrice:null,unit:'un',cat:'info',desc:'Conexão USB, pilha inclusa, 1200 DPI.',badge:'novo'},
  {id:3,name:'Pendrive 32GB',emoji:'💾',price:29.90,oldPrice:39.90,unit:'un',cat:'info',desc:'Armazenamento rápido e durável. USB 3.0.',badge:'oferta'},
  {id:4,name:'Fone de Ouvido',emoji:'🎧',price:39.90,oldPrice:null,unit:'un',cat:'info',desc:'Com microfone, cabo 1,2m, plug P2 universal.'},
  {id:5,name:'Carregador 20W',emoji:'⚡',price:34.90,oldPrice:null,unit:'un',cat:'info',desc:'Carregamento rápido para celular.',badge:'novo'},
  {id:6,name:'Película de Celular',emoji:'📱',price:15.00,oldPrice:null,unit:'un',cat:'info',desc:'Vidro temperado 9H, anti-risco.'},
  {id:7,name:'Caderno Espiral 200f',emoji:'📓',price:22.90,oldPrice:29.90,unit:'un',cat:'papelaria',desc:'200 folhas pautadas, capa dura colorida.',badge:'oferta'},
  {id:8,name:'Caneta Colorida Kit',emoji:'✏️',price:12.90,oldPrice:null,unit:'kit',cat:'papelaria',desc:'Kit com 12 cores vibrantes, ponta fina.'},
  {id:9,name:'Mochila Escolar',emoji:'🎒',price:89.90,oldPrice:120.0,unit:'un',cat:'papelaria',desc:'Impermeável, 2 compartimentos, 30 litros.',badge:'oferta'},
  {id:10,name:'Cola Bastão',emoji:'🖊️',price:5.90,oldPrice:null,unit:'un',cat:'papelaria',desc:'21g, não mancha, ideal para papel.'},
  {id:11,name:'Pasta Arquivo',emoji:'📂',price:8.90,oldPrice:null,unit:'un',cat:'papelaria',desc:'Com elástico, tamanho ofício.'},
  {id:12,name:'Camiseta Básica',emoji:'👕',price:35.00,oldPrice:49.90,unit:'un',cat:'roupas',desc:'100% algodão, vários tamanhos P/M/G/GG.',badge:'oferta'},
  {id:13,name:'Bermuda Jeans',emoji:'👖',price:59.90,oldPrice:null,unit:'un',cat:'roupas',desc:'Corte moderno, tecido resistente.'},
  {id:14,name:'Meias Kit 6 pares',emoji:'🧦',price:24.90,oldPrice:34.90,unit:'kit',cat:'roupas',desc:'Cano curto, algodão misto anti-odor.',badge:'oferta'},
  {id:15,name:'Blusa Feminina',emoji:'👚',price:44.90,oldPrice:null,unit:'un',cat:'roupas',desc:'Leve e fresquinha para o dia a dia.',badge:'novo'},
  {id:16,name:'Xerox P&B (por folha)',emoji:'🖨️',price:0.50,oldPrice:null,unit:'fl',cat:'servicos',desc:'Impressão preto e branco, A4.'},
  {id:17,name:'Xerox Colorida',emoji:'🌈',price:2.00,oldPrice:null,unit:'fl',cat:'servicos',desc:'Impressão colorida A4, alta qualidade.'},
  {id:18,name:'Plastificação A4',emoji:'📂',price:5.00,oldPrice:null,unit:'un',cat:'servicos',desc:'Laminação brilho ou fosca.'},
  {id:19,name:'Formatação PC/Notebook',emoji:'💻',price:80.00,oldPrice:120.0,unit:'un',cat:'servicos',desc:'Inclui sistema, drivers e programas.',badge:'oferta'},
  {id:20,name:'Digitação de Texto',emoji:'⌨️',price:15.00,oldPrice:null,unit:'pág',cat:'servicos',desc:'Por página A4.'},
  {id:21,name:'Pilha AA Kit 4un',emoji:'🔋',price:12.90,oldPrice:null,unit:'kit',cat:'utilidades',desc:'Alta durabilidade.'},
  {id:22,name:'Fita Crepe',emoji:'📦',price:6.90,oldPrice:null,unit:'un',cat:'utilidades',desc:'48mm × 50m.'},
  {id:23,name:'Extensão 3 tomadas',emoji:'🔌',price:29.90,oldPrice:39.90,unit:'un',cat:'utilidades',desc:'Cabo 2m, 10A, com fusível.',badge:'oferta'},
  {id:24,name:'Sacola Resistente',emoji:'🛍️',price:3.50,oldPrice:null,unit:'un',cat:'utilidades',desc:'Ecobag reforçada, reutilizável.'},
  {id:25,name:'Óculos de Sol',emoji:'🕶️',price:49.90,oldPrice:79.90,unit:'un',cat:'moda',desc:'Proteção UV400, armação leve.',badge:'oferta'},
  {id:26,name:'Bolsa Feminina',emoji:'👜',price:79.90,oldPrice:null,unit:'un',cat:'moda',desc:'Sintético premium, alça regulável.',badge:'novo'},
  {id:27,name:'Cinto Couro Sintético',emoji:'👒',price:25.00,oldPrice:null,unit:'un',cat:'moda',desc:'Tamanhos P/M/G/GG.'},
  {id:28,name:'Brinco Folheado',emoji:'💍',price:18.90,oldPrice:29.90,unit:'par',cat:'moda',desc:'Banho de ouro, hipoalergênico.',badge:'oferta'},
];

const catNames = {todos:'Todos',info:'💻 Informática',papelaria:'📚 Papelaria',roupas:'👕 Roupas',servicos:'🖨️ Serviços',utilidades:'🏠 Utilidades',moda:'👗 Moda'};

// ── estado ──
let products = [];
let filterCat = 'todos';
let editingId = null;
let deletingId = null;
let selectedEmoji = '🛍️';

// ── storage ──
function saveStorage(){ localStorage.setItem('loja_patricia_products', JSON.stringify(products)); }
function loadStorage(){
  const d = localStorage.getItem('loja_patricia_products');
  products = d ? JSON.parse(d) : JSON.parse(JSON.stringify(defaultProducts));
}

// ── login ──
function login(){
  const v = document.getElementById('senhaInput').value;
  if(v === SENHA){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminScreen').style.display='block';
    loadStorage();
    renderAll();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('senhaInput').value='';
  }
}
function logout(){
  document.getElementById('adminScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('senhaInput').value='';
}

// ── render ──
function renderAll(){ renderStats(); renderFilterCats(); renderList(); }

function renderStats(){
  const total = products.length;
  const cats = new Set(products.map(p=>p.cat)).size;
  const ofertas = products.filter(p=>p.badge).length;
  document.getElementById('statsArea').innerHTML=`
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Produtos</div></div>
    <div class="stat-card"><div class="stat-num">${cats}</div><div class="stat-label">Categorias</div></div>
    <div class="stat-card"><div class="stat-num">${ofertas}</div><div class="stat-label">Em Destaque</div></div>
  `;
}

function renderFilterCats(){
  const cats = ['todos','info','papelaria','roupas','servicos','utilidades','moda'];
  document.getElementById('filterCats').innerHTML = cats.map(c=>`
    <div class="fcat ${filterCat===c?'active':''}" onclick="setFilter('${c}')">${catNames[c]}</div>
  `).join('');
}

function renderList(){
  let list = filterCat==='todos' ? products : products.filter(p=>p.cat===filterCat);
  if(!list.length){
    document.getElementById('prodList').innerHTML='<div class="empty-list">Nenhum produto nesta categoria 😕</div>';
    return;
  }
  document.getElementById('prodList').innerHTML = list.map(p=>`
    <div class="prod-item">
      <div class="prod-emoji">${p.emoji}</div>
      <div class="prod-info">
        <div class="prod-name">${p.name}</div>
        <div class="prod-meta">${catNames[p.cat]||p.cat} · por ${p.unit}</div>
        <div class="prod-price">R$ ${p.price.toFixed(2).replace('.',',')}${p.oldPrice?` <small style="text-decoration:line-through;color:#ccc;font-size:11px">R$ ${p.oldPrice.toFixed(2).replace('.',',')}</small>`:''}</div>
        ${p.badge?`<span class="prod-badge badge-${p.badge}">${p.badge==='novo'?'🆕 NOVO':'🔥 OFERTA'}</span>`:''}
      </div>
      <div class="prod-actions">
        <button class="btn-edit" onclick="openEdit(${p.id})">✏️ Editar</button>
        <button class="btn-del" onclick="openConfirmDelete(${p.id})">🗑️ Excluir</button>
      </div>
    </div>
  `).join('');
}

function setFilter(cat){ filterCat=cat; renderFilterCats(); renderList(); }

// ── emoji grid ──
function renderEmojiGrid(){
  document.getElementById('emojiGrid').innerHTML = emojis.map(e=>`
    <div class="emoji-opt ${selectedEmoji===e?'selected':''}" onclick="selectEmoji('${e}')">${e}</div>
  `).join('');
}
function selectEmoji(e){
  selectedEmoji=e;
  document.querySelectorAll('.emoji-opt').forEach(el=>{
    el.classList.toggle('selected', el.textContent===e);
  });
}

// ── form ──
function openForm(){
  editingId=null;
  selectedEmoji='🛍️';
  document.getElementById('formTitle').textContent='➕ Novo Produto';
  document.getElementById('fName').value='';
  document.getElementById('fDesc').value='';
  document.getElementById('fPrice').value='';
  document.getElementById('fOldPrice').value='';
  document.getElementById('fUnit').value='un';
  document.getElementById('fCat').value='info';
  document.getElementById('fBadge').value='';
  renderEmojiGrid();
  document.getElementById('formModal').classList.add('open');
}

function openEdit(id){
  const p=products.find(x=>x.id===id);
  editingId=id;
  selectedEmoji=p.emoji;
  document.getElementById('formTitle').textContent='✏️ Editar Produto';
  document.getElementById('fName').value=p.name;
  document.getElementById('fDesc').value=p.desc||'';
  document.getElementById('fPrice').value=p.price;
  document.getElementById('fOldPrice').value=p.oldPrice||'';
  document.getElementById('fUnit').value=p.unit;
  document.getElementById('fCat').value=p.cat;
  document.getElementById('fBadge').value=p.badge||'';
  renderEmojiGrid();
  document.getElementById('formModal').classList.add('open');
}

function closeForm(){ document.getElementById('formModal').classList.remove('open'); }

function saveProduct(){
  const name=document.getElementById('fName').value.trim();
  const price=parseFloat(document.getElementById('fPrice').value);
  if(!name){ showToast('⚠️ Digite o nome do produto!'); return; }
  if(isNaN(price)||price<=0){ showToast('⚠️ Digite um preço válido!'); return; }

  const prod = {
    id: editingId || Date.now(),
    name,
    emoji: selectedEmoji,
    price,
    oldPrice: parseFloat(document.getElementById('fOldPrice').value)||null,
    unit: document.getElementById('fUnit').value,
    cat: document.getElementById('fCat').value,
    desc: document.getElementById('fDesc').value.trim(),
    badge: document.getElementById('fBadge').value||null,
  };

  if(editingId){
    const idx=products.findIndex(x=>x.id===editingId);
    products[idx]=prod;
    showToast('✅ Produto atualizado!');
  } else {
    products.push(prod);
    showToast('✅ Produto adicionado!');
  }

  saveStorage();
  closeForm();
  renderAll();
}

// ── delete ──
function openConfirmDelete(id){
  deletingId=id;
  const p=products.find(x=>x.id===id);
  document.getElementById('confirmText').textContent=`Tem certeza que quer excluir "${p.name}"? Essa ação não pode ser desfeita.`;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm(){ document.getElementById('confirmOverlay').classList.remove('open'); deletingId=null; }
function confirmDelete(){
  products=products.filter(x=>x.id!==deletingId);
  saveStorage();
  closeConfirm();
  renderAll();
  showToast('🗑️ Produto excluído!');
}

// ── toast ──
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// INIT
document.getElementById('senhaInput').addEventListener('keydown', e=>{ if(e.key==='Enter') login(); });
</script>
